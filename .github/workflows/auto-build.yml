name: Auto Build & Release
on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *' # 每日自动构建

permissions:
  contents: write

jobs:
  # 第一步：获取官方最新版本（修复空值问题）
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.TAG }}
    steps:
      - name: 获取 Kiloco 官方最新 Release 版本
        id: get-tag
        run: |
          # 重试3次获取版本，避免网络问题
          TAG=$(curl -s --retry 3 https://api.github.com/repos/Kilo-Org/kiloco/releases/latest | jq -r '.tag_name')
          
          # 关键修复：如果版本为空，强制退出，避免null错误
          if [[ "$TAG" == "null" || -z "$TAG" ]]; then
            echo "❌ 未获取到官方最新版本，终止任务"
            exit 1
          fi
          
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 官方最新版本：$TAG"

  # 第二步：多平台构建
  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux    arch: x64     type: normal
          - os: linux    arch: x64     type: musl
          - os: linux    arch: arm64   type: normal
          - os: linux    arch: arm64   type: musl
          - os: windows  arch: x64     type: modern
          - os: windows  arch: x64     type: legacy

    steps:
      - uses: actions/checkout@v4
      
      - name: 安装依赖
        run: sudo apt update && sudo apt install -y wget jq unzip
      
      - name: 构建便携包
        run: |
          chmod +x build/build.sh
          ./build/build.sh ${{ needs.get-version.outputs.tag }} ${{ matrix.arch }} ${{ matrix.type }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: dist/*.tar.gz

  # 第三步：发布 Release
  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: dist
      
      - name: 发布便携版 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}-portable
          name: Kiloco ${{ needs.get-version.outputs.tag }} (便携版)
          body: |
            🚀 自动同步官方版本构建
            ✅ Linux x64/arm64 (glibc/musl)
            ✅ Windows x64
          files: dist/*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
