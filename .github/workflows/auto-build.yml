name: Auto Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.TAG }}
    steps:
      - name: 获取官方最新版本
        id: get-tag
        run: |
          for i in {1..3}; do
            TAG=$(curl -s --retry 3 https://api.github.com/repos/zeronesun/kilo/releases/latest | jq -r '.tag_name')
            if [ "$TAG" != "null" ] && [ -n "$TAG" ]; then
              break
            fi
            sleep 5
          done
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 官方最新版本: $TAG"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            type: normal
          - os: linux
            arch: x86_64
            type: musl
          - os: linux
            arch: arm64
            type: normal
          - os: linux
            arch: arm64
            type: musl
          - os: windows
            arch: x64
            type: modern
          - os: windows
            arch: x64
            type: legacy
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 1

      - name: 安装依赖
        run: sudo apt update && sudo apt install -y wget jq unzip

      - name: 构建
        run: |
          chmod +x build/build.sh
          ./build/build.sh ${{ needs.get-version.outputs.tag }} ${{ matrix.arch }} ${{ matrix.type }} ${{ matrix.os }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.type }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 1

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 列出产物
        run: ls -lh dist/

      - name: 创建/更新 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}-portable
          name: Kilo ${{ needs.get-version.outputs.tag }} (Portable)
          body: |
            便携版
            - Linux x64/arm64 (glibc/musl)
            - Windows x64 (Bun / Node.js)
          files: dist/*.tar.gz
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
