name: Auto Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.TAG }}
    steps:
      - name: 获取官方最新版本
        id: get-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/Kilo-Org/kilocode/releases --jq '.[0].tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "❌ 无法获取到最新版本，请检查仓库和网络。"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 官方最新版本: $TAG"

  build:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            arch: x86_64
            type: normal
          - os: ubuntu-latest
            arch: x86_64
            type: musl
          - os: ubuntu-latest
            arch: x86_64
            type: baseline
          - os: ubuntu-latest
            arch: x86_64
            type: baseline-musl
          - os: ubuntu-latest
            arch: arm64
            type: normal
          - os: ubuntu-latest
            arch: arm64
            type: musl
          # Windows
          - os: windows-latest
            arch: x64
            type: modern
          - os: windows-latest
            arch: x64
            type: legacy          # baseline
          - os: windows-latest
            arch: arm64
            type: modern
          # macOS
          - os: macos-latest
            arch: arm64
            type: modern          # darwin-arm64.zip
          - os: macos-latest
            arch: x64
            type: modern          # darwin-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: 安装依赖 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y wget jq unzip

      - name: 安装依赖 (macOS)
        if: runner.os == 'macOS'
        run: brew install wget jq unzip

      - name: 构建
        shell: bash
        run: |
          chmod +x build/build.sh
          # 映射运行器操作系统到脚本所需的参数
          case "${{ matrix.os }}" in
            ubuntu-latest)   BUILD_OS="linux" ;;
            windows-latest)  BUILD_OS="windows" ;;
            macos-latest)    BUILD_OS="darwin" ;;
            *)               BUILD_OS="linux" ;;
          esac
          ./build/build.sh ${{ needs.get-version.outputs.tag }} "$BUILD_OS" ${{ matrix.arch }} ${{ matrix.type }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.type }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 列出产物
        run: ls -lh dist/

      - name: 创建/更新 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}-portable
          name: Kilocode ${{ needs.get-version.outputs.tag }} (Portable)
          body: |
            便携版
            - Linux x64/arm64 (glibc/musl/baseline)
            - Windows x64/arm64 (modern/legacy)
            - macOS arm64/x64
          files: dist/*.tar.gz
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
