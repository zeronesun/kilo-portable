name: Auto Build & Release
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.TAG }}
    steps:
      - name: Get latest official version
        id: get-tag
        run: |
          TAG=$(curl -s --retry 3 https://api.github.com/repos/Kilo-Org/kiloco/releases/latest | jq -r '.tag_name')
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Latest version: $TAG"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            type: normal
          - os: linux
            arch: x64
            type: musl
          - os: linux
            arch: arm64
            type: normal
          - os: linux
            arch: arm64
            type: musl
          - os: windows
            arch: x64
            type: modern
          - os: windows
            arch: x64
            type: legacy

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y wget jq unzip

      - name: Build portable package
        run: |
          chmod +x build/build.sh
          ./build/build.sh ${{ needs.get-version.outputs.tag }} ${{ matrix.arch }} ${{ matrix.type }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.type }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}-portable
          name: Kiloco ${{ needs.get-version.outputs.tag }} Portable
          body: |
            🚀 Auto-built portable version
            - Linux x64/arm64 (glibc/musl)
            - Windows x64
          files: dist/*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
